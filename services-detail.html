            // Load data based on URL parameter
            const params = new URLSearchParams(window.location.search);
            const serviceKey = params.get('service');

            const contentContainer = document.getElementById('content-container');
            const cardsGrid = document.getElementById('cards-grid');

            if (serviceKey && servicesData[serviceKey]) {
                const data = servicesData[serviceKey];

                // Populate page tags
                document.getElementById('service-category').textContent = data.category;
                document.getElementById('service-title').textContent = data.title;
                document.getElementById('service-subtitle').textContent = data.subtitle;
                document.title = data.title + " - LuxeEvents";

                // Render cards
                cardsGrid.innerHTML = '';
                data.cards.forEach(card => {
                    const cardHtml = `
                <div class="col-12 col-md-6 col-lg-4 d-flex">
                    <div class="detail-card w-100 d-flex flex-column">
                        <div class="detail-card-image-wrapper">
                            <img src="${card.image}" class="detail-card-image" alt="${card.title}">

                        <div class="detail-card-body d-flex flex-column justify-content-between">

                                <a href="index.html#inquire"><button class="detail-card-btn">Inquire Now</button></a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
